<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>EM Quiz Pool Reviewer (Realtime)</title>
<style>
  :root{
    --bg:#0f172a; --panel:#111827; --card:#0b1220; --muted:#94a3b8; --text:#e5e7eb;
    --accent:#22d3ee; --accent-2:#60a5fa; --good:#22c55e; --warn:#f59e0b; --bad:#ef4444;
    --border:#1f2937; --hover:#1e293b;
  }
  *{box-sizing:border-box}
  html{scroll-padding-bottom:120px}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:var(--accent)}
  header{position:sticky;top:0;z-index:20;background:rgba(15,23,42,0.92);backdrop-filter:saturate(180%) blur(8px);border-bottom:1px solid var(--border)}
  .wrap{max-width:1100px;margin:0 auto;padding:14px 16px}
  h1{margin:0;font-size:18px;font-weight:600;letter-spacing:.2px}
  .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px}
  input[type="search"], select{
    background:#0a0f1c;color:var(--text);border:1px solid var(--border);
    padding:8px 10px;border-radius:8px;font-size:13px;outline:none;
  }
  input[type="search"]{flex:1 1 220px;min-width:160px}
  select{flex:0 0 auto}
  button{background:#1e293b;color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer}
  button:hover{background:#243042}
  button.primary{background:linear-gradient(180deg,#0891b2,#0e7490);border-color:#155e75}
  button.primary:hover{filter:brightness(1.1)}
  button.send{background:linear-gradient(180deg,#16a34a,#15803d);border-color:#166534}
  button.send:hover{filter:brightness(1.1)}
  button.del{background:#451a1a;color:#fca5a5;border-color:#7f1d1d}
  button.del:hover{background:#7f1d1d;color:#fff}
  button:disabled{opacity:.45;cursor:not-allowed}
  .stats{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:12px;color:var(--muted)}
  .stats b{color:var(--text)}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;border:1px solid var(--border);font-size:11px;color:var(--muted);background:#0a0f1c}
  .pill.high{color:#86efac;border-color:#14532d;background:#052e16}
  .pill.medium{color:#fcd34d;border-color:#78350f;background:#1f1305}
  .pill.low{color:#fca5a5;border-color:#7f1d1d;background:#180404}
  .pill.changed{color:#fde68a;border-color:#78350f;background:#251402}
  .pill.reviewed{color:#86efac;border-color:#14532d;background:#052e16}
  .pill.unreviewed{color:#94a3b8}
  .pill.edited{color:#fde68a;border-color:#78350f;background:#251402}
  .pill.has-img{color:#a5f3fc;border-color:#155e75;background:#062734}
  .pill.cached{color:#86efac;border-color:#14532d;background:#052e16}
  .pill.uploaded{color:#a5f3fc;border-color:#155e75;background:#062734}
  .pill.fetched{color:#cbd5e1}
  .pill.cloud{color:#86efac;border-color:#14532d;background:#052e16}
  .pill.host{color:#c4b5fd;border-color:#5b21b6;background:#1e1b4b}
  .pill.tag-intraining{color:#c4b5fd;border-color:#5b21b6;background:#1e1b4b}
  .pill.tag-mcq{color:#a5f3fc;border-color:#155e75;background:#062734}
  .pill.tag-year{color:#fcd34d;border-color:#78350f;background:#1f1305}
  .pill.tag-series{color:#86efac;border-color:#14532d;background:#052e16}
  .pill.tag-other{color:#cbd5e1;border-color:#334155;background:#0f172a}
  /* Activity drawer */
  .drawer{position:fixed;top:0;right:0;height:100vh;width:min(420px, 92vw);background:var(--card);border-left:1px solid var(--border);box-shadow:-12px 0 32px rgba(0,0,0,.5);transform:translateX(100%);transition:transform .25s ease;z-index:70;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .drawer-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .drawer-head h3{margin:0;font-size:15px;font-weight:600}
  .drawer-body{flex:1;overflow-y:auto;padding:8px 0}
  .drawer-empty{padding:30px 16px;color:var(--muted);text-align:center;font-size:13px}
  .log-row{display:grid;grid-template-columns:62px 1fr auto;gap:8px;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;font-size:12px}
  .log-row:hover{background:var(--hover)}
  .log-row .when{color:var(--muted);font-size:11px;white-space:nowrap}
  .log-row .who{color:#a5f3fc;font-weight:600;font-size:11px}
  .log-row .what{color:var(--text);font-size:12px}
  .log-row .qref{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;color:var(--accent)}
  .pill.schema{color:#fde68a;border-color:#78350f;background:#1f1305}
  .pill.cloud-on{color:#86efac;border-color:#14532d;background:#052e16}
  .pill.cloud-off{color:#fca5a5;border-color:#7f1d1d;background:#180404}
  .pill.cloud-loading{color:#fcd34d;border-color:#78350f;background:#1f1305}
  .pill.byline{color:#a5f3fc;border-color:#155e75;background:#062734}
  .pill.you{color:#86efac;border-color:#14532d;background:#052e16}
  .pill.click{cursor:pointer;text-decoration:underline dotted}
  main{padding:16px 16px 60vh}
  .topic-group{margin:18px 0}
  .topic-head{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0 8px;border-bottom:1px solid var(--border);margin-bottom:10px;cursor:pointer}
  .topic-head h2{margin:0;font-size:15px;font-weight:600;color:var(--accent-2)}
  .topic-meta{color:var(--muted);font-size:12px}
  .qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin:10px 0;transition:border-color .15s ease;scroll-margin-top:140px;contain:layout style}
  .qcard.reviewed{border-color:#14532d}
  .qcard.changed{border-color:#92400e}
  .qcard.edited{border-color:#92400e}
  .qcard.flash{animation:flash .9s ease}
  @keyframes flash{0%{box-shadow:0 0 0 2px var(--accent)}100%{box-shadow:0 0 0 0 transparent}}
  .qhead{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;flex-wrap:wrap;margin-bottom:8px}
  .qmeta{display:flex;gap:6px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
  .qmeta .num{color:var(--text);font-weight:600}
  .qstem{font-size:14px;line-height:1.55;margin:6px 0 10px;white-space:pre-wrap}
  .opts{display:flex;flex-direction:column;gap:6px}
  label.opt{display:flex;gap:10px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:#0a0f1c;align-items:flex-start;line-height:1.45}
  label.opt:hover{background:var(--hover)}
  label.opt input{margin-top:3px;flex:0 0 auto;accent-color:#22d3ee}
  label.opt .otext{flex:1}
  label.opt.ai{border-color:#1e3a8a;background:#0c1530}
  label.opt.user{border-color:#16a34a;background:#062714}
  label.opt.both{border-color:#22d3ee;background:#0a2a30}
  .badges{display:flex;gap:6px;flex-wrap:wrap;margin-left:6px}
  .badge{font-size:10px;padding:1px 6px;border-radius:999px;border:1px solid;line-height:1.6}
  .badge.ai{color:#93c5fd;border-color:#1d4ed8;background:#0b1530}
  .badge.user{color:#86efac;border-color:#14532d;background:#052e16}
  .actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:10px;flex-wrap:wrap}
  .actions .left{display:flex;gap:6px;flex-wrap:wrap}
  details{margin-top:8px;border-top:1px dashed var(--border);padding-top:8px}
  details summary{cursor:pointer;color:var(--muted);font-size:12px;list-style:none}
  details summary::-webkit-details-marker{display:none}
  details summary::before{content:"\25B8 ";color:var(--accent)}
  details[open] summary::before{content:"\25BE "}
  .exp{margin-top:6px;color:#cbd5e1;font-size:13px;line-height:1.55;background:#0a0f1c;padding:8px 10px;border-radius:8px;border:1px solid var(--border)}
  textarea.note{width:100%;background:#0a0f1c;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px;font:inherit;min-height:60px;resize:vertical;margin-top:6px}
  .editbox{background:#0a0f1c;border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:6px}
  .editbox label{display:block;color:var(--muted);font-size:11px;margin:6px 0 4px;text-transform:uppercase;letter-spacing:.5px}
  .editbox textarea, .editbox input[type="text"]{
    width:100%;background:#070b14;color:var(--text);border:1px solid var(--border);
    border-radius:8px;padding:8px 10px;font:inherit;
  }
  .editbox textarea{resize:vertical;min-height:80px}
  .opt-edit{display:flex;gap:6px;margin-bottom:6px;align-items:center}
  .opt-edit .lbl{flex:0 0 auto;font-weight:600;color:var(--accent-2);width:18px;text-align:center}
  .opt-edit input{flex:1}
  .opt-edit button{flex:0 0 auto;padding:6px 8px;font-size:12px}
  .editbox .ctrls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;position:sticky;bottom:90px;background:linear-gradient(to top, var(--card) 60%, transparent);padding:10px 0 8px;z-index:5;border-top:1px solid var(--border)}
  .qimg-wrap{margin:8px 0;position:relative;display:inline-block;max-width:100%}
  .qimg-wrap img{max-width:100%;max-height:380px;border-radius:10px;border:1px solid var(--border);display:block;background:#000;cursor:zoom-in}
  .qimg-wrap .imgtools{position:absolute;top:6px;right:6px;display:flex;gap:4px}
  .qimg-wrap .imgtools button{padding:4px 8px;font-size:11px;background:rgba(15,23,42,.85);backdrop-filter:blur(6px)}
  .imgmeta{font-size:11px;color:var(--muted);margin-top:4px}
  .file-input{display:none}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#1f2937;color:#fff;padding:10px 16px;border-radius:10px;border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:50;font-size:13px;max-width:90vw;text-align:center}
  .toast.err{background:#7f1d1d;border-color:#dc2626}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:60;cursor:zoom-out}
  .lightbox img{max-width:96vw;max-height:96vh}
  .lightbox.show{display:flex}
  footer.bar{position:fixed;left:0;right:0;bottom:0;background:rgba(15,23,42,0.96);backdrop-filter:saturate(180%) blur(8px);border-top:1px solid var(--border);z-index:30}
  footer .wrap{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;padding:10px 16px}
  .progressbar{flex:0 0 8px;height:8px;width:100%;background:#0a0f1c;border:1px solid var(--border);border-radius:999px;overflow:hidden}
  .progressbar > div{height:100%;background:linear-gradient(90deg,#06b6d4,#22c55e);width:0%}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  kbd{font:11px ui-monospace,Menlo,Consolas,monospace;background:#0a0f1c;border:1px solid var(--border);border-bottom-width:2px;padding:1px 5px;border-radius:4px}
  .splash{min-height:60vh;display:flex;align-items:center;justify-content:center;padding:40px 16px}
  .splash .card{max-width:560px;width:100%;background:var(--card);border:1px dashed var(--border);border-radius:14px;padding:32px 24px;text-align:center}
  .splash.dragover .card{border-color:var(--accent);background:#0a2a30}
  .splash h2{margin:0 0 8px;font-size:20px}
  .splash p{margin:6px 0;color:var(--muted)}
  .splash .big-btn{margin-top:16px;padding:12px 22px;font-size:14px}
  .splash .hint{margin-top:14px;font-size:12px;color:var(--muted)}
  .splash code{background:#0a0f1c;border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-size:12px}
  /* Display-name modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:80;backdrop-filter:blur(4px)}
  .modal-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px 28px;width:min(420px, 92vw)}
  .modal-card h3{margin:0 0 6px;font-size:18px}
  .modal-card p{margin:0 0 14px;color:var(--muted);font-size:13px}
  .modal-card input{width:100%;background:#0a0f1c;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;outline:none}
  .modal-card input:focus{border-color:var(--accent)}
  .modal-card .row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
  .modal-card .err{color:#fca5a5;font-size:12px;margin-top:8px;display:none;min-height:1em}
  .modal-card.shake{animation:shake .35s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  @media (max-width:600px){
    /* Mobile: shrink the sticky header so cards aren't blocked */
    header .wrap{padding:8px 12px}
    h1{font-size:15px;display:flex;flex-wrap:wrap;align-items:center;gap:4px}
    .sub{display:none}                               /* tagline takes a row, hide it */
    /* Top action buttons go to icon-only style */
    header button{padding:7px 9px;font-size:12px}
    header #btnSendOwner{padding:7px 11px}           /* keep the green CTA legible */
    /* Toolbar (search+filters) becomes a single search row + collapsible filters */
    .toolbar{gap:6px;margin-top:8px}
    .toolbar select{display:none}                    /* hide dropdowns by default */
    .toolbar #btnExpand{display:none}                /* hide topic-toggle by default */
    .toolbar.open select{display:block;flex:1 1 calc(50% - 4px);min-width:0}
    .toolbar.open #btnExpand{display:block;width:100%}
    .toolbar #btnFilters{display:inline-flex}        /* show the new mobile-only Filters button */
    .stats{display:none}                             /* hide stats summary by default */
    .toolbar.open ~ .stats{display:flex}             /* show when filters expanded */
    /* Card adjustments unchanged */
    .qhead{flex-direction:column;align-items:stretch}
    .actions{flex-direction:column;align-items:stretch}
    /* Header pills shrink */
    h1 .pill{font-size:10px;padding:1px 6px}
    /* Drop GPU-heavy blur on mobile to keep typing smooth */
    header{backdrop-filter:none;-webkit-backdrop-filter:none}
    footer.bar{backdrop-filter:none;-webkit-backdrop-filter:none}
  }
  /* Filters button is hidden on desktop; toggled-in only via mobile media */
  #btnFilters{display:none}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
      <div>
        <h1>EM Quiz Pool Reviewer
          <span class="pill" id="poolVersionPill">no pool</span>
          <span class="pill" id="poolSourcePill" title="Where the current pool was loaded from">empty</span>
          <span class="pill schema" id="poolSchemaPill" style="display:none" title="Detected JSON schema">schema?</span>
          <span class="pill cloud-loading" id="cloudPill" title="Cloud sync status">cloud: connecting...</span>
          <span class="pill click" id="reviewerPill" title="Click to change your display name">you: ?</span>
        </h1>
        <div class="sub">Edits sync live to Firebase. All reviewers see each other's changes in real time.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="poolFile" type="file" accept="application/json,.json" class="file-input">
        <button id="btnLog" title="Show recent edits by all reviewers">📋 Activity</button>
        <button id="btnUpload" title="Load a QuizPool JSON file">UPLOAD POOL</button>
        <button id="btnReset" title="Clear your local cache only (cloud state stays)">Local reset</button>
        <button id="btnExport" title="Download the latest CLOUD state as JSON">Export</button>
        <button id="btnSendOwner" class="send" title="Download the cloud state and open email">SEND TO OWNER</button>
      </div>
    </div>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Search by q_xxxx, text, options, subtopic...">
      <select id="fTopic"><option value="">All topics</option></select>
      <select id="fConf">
        <option value="">All confidence</option>
        <option value="low">Low only</option>
        <option value="medium">Medium only</option>
        <option value="medium,low">Medium + Low (priority)</option>
        <option value="high">High only</option>
      </select>
      <select id="fStatus">
        <option value="">All review status</option>
        <option value="unreviewed">Not yet reviewed</option>
        <option value="reviewed">Reviewed</option>
        <option value="changed">Answer changed</option>
        <option value="agreed">Agreed (you confirmed AI)</option>
        <option value="edited">Edited text/options</option>
        <option value="image">Has image</option>
      </select>
      <select id="fSort" title="How to sort questions">
        <option value="">Group by topic (default)</option>
        <option value="id-asc">By question # (q_0001 -> q_xxxx)</option>
        <option value="id-desc">By question # (q_xxxx -> q_0001)</option>
      </select>
      <button id="btnFilters" title="Show filters and sort options">⚙ Filters</button>
      <button id="btnExpand" title="Expand/collapse all topics">Toggle topics</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="lightbox" id="lightbox" onclick="this.classList.remove('show')"><img id="lbImg" alt=""></div>
  <div class="drawer" id="logDrawer">
    <div class="drawer-head">
      <h3>📋 Recent activity</h3>
      <button id="logClose">✕</button>
    </div>
    <div class="drawer-body" id="logBody">
      <div class="drawer-empty">Loading…</div>
    </div>
  </div>
</header>

<main class="wrap" id="root"></main>

<footer class="bar">
  <div class="wrap">
    <div style="display:flex;flex-direction:column;gap:4px;flex:1 1 240px;min-width:200px">
      <div style="display:flex;gap:14px;font-size:12px;color:var(--muted);flex-wrap:wrap">
        <span><b id="reviewedCount" style="color:var(--text)">0</b>/<span id="totalCount">0</span> reviewed</span>
        <span><b id="changedCount" style="color:var(--text)">0</b> changed</span>
        <span><b id="editedCount" style="color:var(--text)">0</b> edited</span>
        <span><b id="imageCount" style="color:var(--text)">0</b> images</span>
      </div>
      <div class="progressbar"><div id="progressBar"></div></div>
    </div>
    <div style="font-size:11px;color:var(--muted)">
      <kbd>1</kbd>-<kbd>9</kbd> &middot; <kbd>r</kbd> reviewed &middot; <kbd>n</kbd> next
    </div>
    <button id="btnExport2">Export</button>
    <button id="btnSendOwner2" class="send">SEND TO OWNER</button>
  </div>
</footer>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, deleteDoc, addDoc, collection, onSnapshot, serverTimestamp, deleteField, writeBatch, query, orderBy, limit }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getStorage, ref as storageRef, uploadString, getDownloadURL, deleteObject }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js';

// ---- Firebase config (reused from EM Web app) ----
const firebaseConfig = {
  apiKey: "AIzaSyCByZ1gm2oStuqi_9BXuA26QOWnKRmbD34",
  authDomain: "eprj-textsummarizer.firebaseapp.com",
  projectId: "eprj-textsummarizer",
  storageBucket: "eprj-textsummarizer.firebasestorage.app",
  messagingSenderId: "39520423716",
  appId: "1:39520423716:web:495266620ba680436cadb1"
};

let fbApp, fbDb, fbStorage;
let cloudOK = false;
try {
  fbApp     = initializeApp(firebaseConfig);
  fbDb      = getFirestore(fbApp);
  fbStorage = getStorage(fbApp);
  cloudOK = true;
} catch(e){
  console.warn("Firebase init failed", e);
}

const UPLOADED_POOL_KEY = "emQuizUploadedPool";
  // One-time cache buster: schema bumps invalidate the cached pool so it
  // gets re-fetched from Storage with the latest normalize logic (e.g.
  // when we add new preserved fields like q.tags).
  const SCHEMA_VERSION_KEY = "emQuizSchemaVersion";
  const SCHEMA_VERSION = "v3-tags-preserved";
  try {
    if (localStorage.getItem(SCHEMA_VERSION_KEY) !== SCHEMA_VERSION) {
      localStorage.removeItem(UPLOADED_POOL_KEY);
      localStorage.setItem(SCHEMA_VERSION_KEY, SCHEMA_VERSION);
      console.log("Reviewer: cleared stale cached pool to refresh tags");
    }
  } catch(e){}
  const REVIEWER_UNLOCK_KEY = "emQuizUnlocked";
  // SHA-256 of the access password. To rotate:
  //   1) compute SHA-256 of new password
  //   2) replace this constant
  //   3) re-deploy.
  // Default password is "em-review-2026". Soft client-side gate only.
  const PASSWORD_HASH = "2eb8b9136faa9116f03406f22deb9400d94f2cccae22e2646786b2cfdf13ec52";
  async function sha256Hex(s){
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
  }
  function isUnlocked(){
    try { return localStorage.getItem(REVIEWER_UNLOCK_KEY) === PASSWORD_HASH; }
    catch(e){ return false; }
  }
  function checkPasswordGate(){
    return new Promise(resolve => {
      if (isUnlocked()){ resolve(true); return; }
      const m = document.createElement("div");
      m.className = "modal";
      m.innerHTML = `
        <div class="modal-card" id="gateCard">
          <h3>Access required</h3>

  "./pool.json",

  "../Ready to Upload/CompleteQuizPools_Ver.1.3.json"

function detectSchema(q){
  if (!q || typeof q !== "object") return null;
  if (typeof q.q === "string" && Array.isArray(q.opts)) return "v1";
  if (typeof q.question === "string" && Array.isArray(q.options)) return "v2";
  return null;
}
function normalizeQuestion(q, schema){
  if (schema === "v1") return Object.assign({}, q);
  if (schema === "v2"){
    const out = {
      q: q.question, opts: q.options, ans: q.correct, exp: q.explanation,
      topic: q.topic, subtopic: q.subtopic, difficulty: q.difficulty,
      confidence: q.confidence, source: q.source, year: q.year, page: q.page,
      hasAnswer: q.hasAnswer,
      tags: Array.isArray(q.tags) ? q.tags.slice() : []
    };
    if (q.id)        out.__sourceId = q.id;
    if (q.updatedAt) out.__sourceUpdatedAt = q.updatedAt;
    return out;
  }
  return Object.assign({}, q);
}
function denormalizeQuestion(q, schema){
  if (schema === "v2"){
    const out = {
      question: q.q, options: q.opts, correct: q.ans, explanation: q.exp || "",
      topic: q.topic, subtopic: q.subtopic, difficulty: q.difficulty,
      confidence: q.confidence, source: q.source, year: q.year, page: q.page,
      hasAnswer: q.hasAnswer
    };
    if (Array.isArray(q.tags) && q.tags.length) out.tags = q.tags.slice();
    if (q.__sourceId)        out.id        = q.__sourceId;
    if (q.__sourceUpdatedAt) out.updatedAt = q.__sourceUpdatedAt;
    return out;
  }
  const v1 = {
    q: q.q, opts: q.opts, ans: q.ans, exp: q.exp || "",
    topic: q.topic, subtopic: q.subtopic, difficulty: q.difficulty,
    confidence: q.confidence, source: q.source, year: q.year, page: q.page,
    hasAnswer: q.hasAnswer
  };
  if (Array.isArray(q.tags) && q.tags.length) v1.tags = q.tags.slice();
  return v1;
}
function normalizePool(arr){
  if (!Array.isArray(arr)) return { error: "Top-level JSON must be an array" };
  if (arr.length === 0)   return { error: "Pool is empty" };
  const schema = detectSchema(arr[0]);
  if (!schema) return { error: "Unrecognized question shape" };
  for (let i = 0; i < Math.min(arr.length, 5); i++){
    const s = detectSchema(arr[i]);
    if (s !== schema) return { error: `Question ${i} schema mismatch` };
    const stem = (schema === "v1") ? arr[i].q : arr[i].question;
    const opts = (schema === "v1") ? arr[i].opts : arr[i].options;
    const ans  = (schema === "v1") ? arr[i].ans : arr[i].correct;
    if (typeof stem !== "string")               return { error: `Question ${i} missing question text` };
    if (!Array.isArray(opts) || opts.length<2)  return { error: `Question ${i} needs at least 2 options` };
    if (typeof ans !== "number")                return { error: `Question ${i} missing correct-answer index` };
  }
  return { schema, pool: arr.map(q => normalizeQuestion(q, schema)) };
}

// Subscribe to quiz_pool. Any doc whose ID starts with `h_` is treated as a
// host-added question and merged into POOL. Subscribe ONCE, persist across
// pool version switches.
function subscribeToHostQuestions(){
  if (!cloudOK) return;
  if (HOST_UNSUB){ HOST_UNSUB(); HOST_UNSUB = null; }
  HOST_UNSUB = onSnapshot(collection(fbDb, 'quiz_pool'), snap => {
    let dirty = 0;
    snap.docChanges().forEach(ch => {
      const id = ch.doc.id;
      if (!id.startsWith('h_')) return;
      if (ch.type === 'removed'){
        const hi = HOST_POOL.findIndex(q => q.__id === id);
        if (hi >= 0) HOST_POOL.splice(hi, 1);
        const pi = POOL.findIndex(q => q.__id === id);
        if (pi >= 0) POOL.splice(pi, 1);
        delete POOL_MAP[id];
        dirty++;
        return;
      }
      const q = hostQpToInternal(id, ch.doc.data());
      const hi = HOST_POOL.findIndex(qq => qq.__id === id);
      if (hi >= 0) HOST_POOL[hi] = q; else HOST_POOL.push(q);
      const pi = POOL.findIndex(qq => qq.__id === id);
      if (pi >= 0) POOL[pi] = q; else POOL.push(q);
      POOL_MAP[id] = q;
      dirty++;

// ---------- quiz_pool sync helpers ----------
function stableIdOf(qid){

// NOTE: `orig` (from POOL_MAP) must be a normalizePool()-processed object (v1 shape: .q, .opts, .ans).
// The orig.correct fallback handles edge-cases where a raw v2 object bypasses normalization.
function buildQPDoc(qid, mergedState){
  const orig = POOL_MAP[qid] || {};
  const effectiveAns = (typeof mergedState.userAns === 'number') ? mergedState.userAns
                     : (typeof orig.ans === 'number')            ? orig.ans
                     : (typeof orig.correct === 'number')        ? orig.correct : null;
  const effectiveQ   = (typeof mergedState.userQ === 'string' && mergedState.userQ)
                       ? mergedState.userQ : (orig.q || '');
  const effectiveOpt = (Array.isArray(mergedState.userOpts) && mergedState.userOpts.length)
                       ? mergedState.userOpts : (orig.opts || []);
  return {
    id:          orig.__sourceId || qid,
    __reviewerId: qid,
    question:    effectiveQ,
    options:     effectiveOpt,
    correct:     effectiveAns,
    explanation: (typeof mergedState.userExp === 'string' && mergedState.userExp) ? mergedState.userExp : (mergedState.explanation || orig.exp || ''),
    topic:       (typeof mergedState.userTopic === 'string' && mergedState.userTopic) ? mergedState.userTopic : (orig.topic || 'General EM'),
    subtopic:    (typeof mergedState.userSubtopic === 'string') ? mergedState.userSubtopic : (orig.subtopic || ''),
    difficulty:  orig.difficulty || 'medium',
    source:      orig.source     || '',
    year:        String(orig.year || ''),
    hasAnswer:   typeof effectiveAns === 'number',
    imageUrl:    mergedState.imageUrl || null,
    imageW:      mergedState.imageW   || null,
    imageH:      mergedState.imageH   || null,
    tags:        Array.isArray(mergedState.userTags) ? mergedState.userTags.slice() : (Array.isArray(orig.tags) ? orig.tags.slice() : []),
    updatedAt:   serverTimestamp()
  };
}
// Soft-delete in quizReviews (so other reviewers hide it) AND hard-delete
// from quiz_pool (so the Web app removes it from POOL_CACHE in realtime).
async function deleteQuestion(qid){

  // Optimistic local update so UI hides it immediately.
  STATE[qid] = Object.assign({}, STATE[qid] || {}, { deleted: true, deletedBy: REVIEWER || "anon", deletedAt: { _local: Date.now() } });
  if (POOL_MAP[qid] && POOL_MAP[qid].__isHostAdded){
    const i = POOL.findIndex(x => x.__id === qid);
    if (i >= 0) POOL.splice(i, 1);
    delete POOL_MAP[qid];
    const j = HOST_POOL.findIndex(x => x.__id === qid);
    if (j >= 0) HOST_POOL.splice(j, 1);
  }
  rerender();
  const sid = stableIdOf(qid);
  try {
    await setDoc(questionDoc(qid), { deleted: true, deletedBy: REVIEWER || "anon", deletedAt: serverTimestamp() }, { merge: true });
    logActivity(qid, "🗑 deleted");
  } catch(e){ console.warn("quizReviews soft-delete failed:", e.message); throw e; }
  try {
    await deleteDoc(doc(fbDb, "quiz_pool", sid));
  } catch(e){ console.warn("quiz_pool hard-delete failed:", e.message); }

function describePatch(patch){
  const parts = [];
  if (typeof patch.userAns === "number") parts.push(`picked ${String.fromCharCode(65 + patch.userAns)}`);
  if (patch.userQ === null) parts.push("reset stem");
  else if (typeof patch.userQ === "string") parts.push("edit stem");
  if (patch.userOpts === null) parts.push("reset options");
  else if (Array.isArray(patch.userOpts)) parts.push("edit options");
  if (typeof patch.note === "string") parts.push(patch.note ? "wrote note" : "cleared note");
  if (patch.userExp === null) parts.push("reset explanation");
  else if (typeof patch.userExp === "string") parts.push("edited explanation");
  if (patch.userTopic === null) parts.push("reset topic");
  else if (typeof patch.userTopic === "string") parts.push("set topic: " + patch.userTopic);
  if (patch.userSubtopic === null) parts.push("reset subtopic");
  else if (typeof patch.userSubtopic === "string") parts.push("set subtopic");
  if (patch.userTags === null) parts.push("reset tags");
  else if (Array.isArray(patch.userTags)) parts.push("edited tags");
  if (patch.reviewed === true) parts.push("✓ reviewed");
  if (patch.reviewed === false) parts.push("✗ unreviewed");
  return parts.join(", ") || "update";
}

async function pushQuestionUpdate(qid, patch){

    editedBy: REVIEWER || "anon",
    editedAt: serverTimestamp()

  // Merge into local STATE immediately for snappy UI; the listener will reconcile
  STATE[qid] = Object.assign({}, STATE[qid] || {}, patch);
  STATE[qid].editedBy = merged.editedBy;
  STATE[qid].editedAt = { _local: Date.now() };
  // Note-only patches don't need DOM rebuild — the textarea already shows the
  // user's typing. Rebuilding here would steal focus and interrupt typing.

  try {

// ---------- State accessors ----------
function getR(id){ return STATE[id] || {}; }
function isReviewed(q){ return !!getR(q.__id).reviewed; }
function userAnsOf(q){ const r = getR(q.__id); return (typeof r.userAns === "number") ? r.userAns : null; }

function isAgreed(q){ const ua = userAnsOf(q); return ua !== null && ua === q.ans; }
function isEdited(q){ const r = getR(q.__id); return (typeof r.userQ === "string") || Array.isArray(r.userOpts) || (typeof r.userExp === "string") || (typeof r.userTopic === "string") || (typeof r.userSubtopic === "string") || Array.isArray(r.userTags); }
function hasImage(q){ const r = getR(q.__id); return !!(r.imageUrl); }
function effectiveQ(q){ const r = getR(q.__id); return (typeof r.userQ === "string" && r.userQ.length > 0) ? r.userQ : q.q; }
function effectiveOpts(q){ const r = getR(q.__id); return (Array.isArray(r.userOpts) && r.userOpts.length > 0) ? r.userOpts : (q.opts || []); }
function effectiveExp(q){ const r = getR(q.__id); return (typeof r.userExp === "string" && r.userExp.length > 0) ? r.userExp : (q.exp || ""); }
function effectiveTopic(q){ const r = getR(q.__id); return (typeof r.userTopic === "string" && r.userTopic.length > 0) ? r.userTopic : (q.topic || ""); }
function effectiveSubtopic(q){ const r = getR(q.__id); return (typeof r.userSubtopic === "string") ? r.userSubtopic : (q.subtopic || ""); }
function effectiveTags(q){ const r = getR(q.__id); return Array.isArray(r.userTags) ? r.userTags : (Array.isArray(q.tags) ? q.tags : []); }
function lastEditorOf(q){
  const r = getR(q.__id);
  if (!r.editedBy && !r.editedAt) return null;
  return { by: r.editedBy || "?", at: r.editedAt };
}
function fmtTimeAgo(ts){
  let ms;
  if (!ts) return "";
  if (ts._local) ms = ts._local;
  else if (typeof ts.toMillis === "function") ms = ts.toMillis();
  else if (ts.seconds) ms = ts.seconds * 1000;
  else return "";
  const d = (Date.now() - ms) / 1000;
  if (d < 5) return "just now";
  if (d < 60) return Math.floor(d) + "s ago";
  if (d < 3600) return Math.floor(d/60) + "m ago";
  if (d < 86400) return Math.floor(d/3600) + "h ago";
  return Math.floor(d/86400) + "d ago";
}

// ---------- Pool upload / fetch ----------
function detectVersion(filename){
  if (!filename) return null;
  const m = filename.match(/(?:Ver\.?|v)?(\d+\.\d+)/i);
  return m ? m[1] : null;
}
function loadFromFile(file){
  if (!file) return;
  if (!/\.json$/i.test(file.name) && file.type !== "application/json") {
    toast("Please choose a .json file", true); return;
  }
  const reader = new FileReader();
  reader.onerror = () => toast("Could not read file", true);
  reader.onload = async () => {
    const text = reader.result;
    let arr;
    try { arr = JSON.parse(text); }
    catch(e){ toast("Invalid JSON: " + e.message, true); return; }
    const r = normalizePool(arr);
    if (r.error){ toast("Invalid pool: " + r.error, true); return; }
    const version = detectVersion(file.name) || "uploaded";
    try {
      localStorage.setItem(UPLOADED_POOL_KEY, JSON.stringify({
        version, schema: r.schema, filename: file.name, savedAt: Date.now(), pool: r.pool
      }));
    } catch(e){
      toast("Loaded into memory only (cache full)", true);
    }
    // Capture reviewed state from current pool before STATE is cleared by setActivePool
    const preUploadMap = {};
    POOL.forEach(q => {
      const sid = stableIdOf(q.__id);
      if (STATE[q.__id] && Object.keys(STATE[q.__id]).length > 0) {
        preUploadMap[sid] = Object.assign({}, STATE[q.__id]);
      }
    });
    setActivePool(r.pool, version, "uploaded", r.schema);
    rerender();
    toast(`Loaded ${r.pool.length} questions (v${version}, schema ${r.schema})`);

    // Push the pool itself to Firebase so other reviewers auto-switch to it.
    if (cloudOK){
      try {
        const path = `quizReviews/_pools/v${version}.json`;
        const ref = storageRef(fbStorage, path);
        await uploadString(ref, text, "raw", {contentType: "application/json"});
        const url = await getDownloadURL(ref);
        await setDoc(doc(fbDb, "quizReviews", "_meta"), {
          activePool: {
            version, schema: r.schema, filename: file.name,
            storagePath: path, downloadUrl: url,
            questionCount: r.pool.length,
            uploadedBy: REVIEWER || "anon",
            uploadedAt: serverTimestamp()
          }
        }, {merge: true});
        // Batch-seed quiz_pool so Web App gets all questions immediately
        // NOTE: __sourceId must be stable across pool versions for state carry-over to work.
        // If a question lacks __sourceId, carry-over falls back to positional __id matching.
        try {
          const BATCH_SIZE = 500; // Firestore hard limit per batch
          const poolToSeed = POOL; // POOL is now the newly loaded pool
          if (poolToSeed.length === 0) {
            toast(`Cloud-synced v${version} - other reviewers will switch shortly`);
          } else {
            let carryOverCount = 0;
            for (let i = 0; i < poolToSeed.length; i += BATCH_SIZE) {
              const batch = writeBatch(fbDb);
              poolToSeed.slice(i, i + BATCH_SIZE).forEach(q => {
                const sid = stableIdOf(q.__id);
                const prevState = preUploadMap[sid] || {};
                if (Object.keys(prevState).length > 0) carryOverCount++;
                const qpDoc = buildQPDoc(q.__id, prevState);
                batch.set(doc(fbDb, 'quiz_pool', sid), qpDoc);
              });
              await batch.commit();
            }
            console.log(`quiz_pool seed: ${carryOverCount}/${poolToSeed.length} questions had prior reviewed state`);
            toast(`Cloud-synced v${version} — ${poolToSeed.length} questions live in quiz_pool`);
          }
        } catch(seedErr){
          console.warn('quiz_pool batch seed failed:', seedErr.message);
          toast(`Cloud-synced v${version} but quiz_pool seed failed: ` + seedErr.message, true);
        }
      } catch(e){
        console.error(e);
        toast("Cloud upload failed: " + e.message, true);
      }
    }
  };
  reader.readAsText(file);
}
function tryLoadCachedUploaded(){
  try {
    const raw = localStorage.getItem(UPLOADED_POOL_KEY);
    if (!raw) return false;
    const obj = JSON.parse(raw);
    if (!obj || !Array.isArray(obj.pool)) return false;
    const r = normalizePool(obj.pool);
    if (r.error){ localStorage.removeItem(UPLOADED_POOL_KEY); return false; }
    setActivePool(r.pool, obj.version || "uploaded", "cached", r.schema);
    return true;
  } catch(e){ return false; }
}
async function tryAutoFetch(){
  for (const path of AUTO_FETCH_CANDIDATES){
    try {
      const res = await fetch(path, {cache: "no-cache"});
      if (!res.ok) continue;
      const arr = await res.json();
      const r = normalizePool(arr);
      if (r.error) continue;
      const version = detectVersion(path.split("/").pop()) || "1.0";
      setActivePool(r.pool, version, "fetched", r.schema);
      return true;
    } catch(e){}
  }
  return false;
}

// ---------- Image: resize then upload to Firebase Storage ----------
const MAX_W = 1280, MAX_H = 1280, JPEG_Q = 0.78;
function fileToResizedDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.naturalWidth, h = img.naturalHeight;
        const scale = Math.min(1, MAX_W / w, MAX_H / h);
        w = Math.round(w * scale); h = Math.round(h * scale);
        const c = document.createElement("canvas");
        c.width = w; c.height = h;
        const ctx = c.getContext("2d");
        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        const url = c.toDataURL("image/jpeg", JPEG_Q);
        resolve({dataUrl: url, w, h, originalSize: file.size});
      };
      img.onerror = () => reject(new Error("Could not decode image"));
      img.src = reader.result;
    };
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.readAsDataURL(file);
  });
}
async function attachImage(qid, file){
  if (!file) return;
  if (!cloudOK){ toast("Cloud sync needed for image upload", true); return; }
  if (file.size > 20 * 1024 * 1024) { toast("Image too large (max 20MB)", true); return; }
  toast(`Uploading image for ${qid}...`);
  try {
    const meta = await fileToResizedDataURL(file);
    const path = "quizReviews/v" + POOL_VERSION + "/" + qid + ".jpg";
    const r = storageRef(fbStorage, path);
    await uploadString(r, meta.dataUrl, "data_url");
    const downloadUrl = await getDownloadURL(r);
    await pushQuestionUpdate(qid, {
      imageUrl: downloadUrl,
      imageStoragePath: path,
      imageW: meta.w, imageH: meta.h
    });
    logActivity(qid, '🖼 attached image');
    toast(`Image uploaded (${meta.w}x${meta.h})`);
  } catch(e){
    console.error(e); toast("Image upload failed: " + e.message, true);
  }
}
async function removeImage(qid){
  const r = STATE[qid] || {};
  const path = r.imageStoragePath;
  if (path){
    try { await deleteObject(storageRef(fbStorage, path)); } catch(e){ console.warn(e); }
  }
  // Clear fields in Firestore
  await pushQuestionUpdate(qid, {
    imageUrl: null, imageStoragePath: null, imageW: null, imageH: null
  });
  logActivity(qid, '🖼 removed image');
}

const root = document.getElementById("root");
const search = document.getElementById("search");
const fTopic = document.getElementById("fTopic");
const fConf = document.getElementById("fConf");
const fStatus = document.getElementById("fStatus");

function escapeHTML(s){
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function letter(i){ return String.fromCharCode(65+i); }

function passesFilters(q){
  // Soft-deleted questions are hidden everywhere
  if (getR(q.__id).deleted) return false;
  const sq = search.value.trim().toLowerCase();
  if (sq) {
    // Pure digits: treat as a question-number lookup. "1000" -> q_1000, "5" -> q_0005.
    if (/^\d+$/.test(sq)) {
      const padded = "q_" + sq.padStart(4, "0");
      if (q.__id !== padded) return false;
    } else {
      const hay = ((q.__id||"") + " " + (q.__sourceId||"") + " " + effectiveQ(q) + " " + effectiveOpts(q).join(" ") + " " + effectiveSubtopic(q) + " " + effectiveTopic(q)).toLowerCase();
      if (!hay.includes(sq)) return false;
    }
  }
  if (fTopic.value && effectiveTopic(q) !== fTopic.value) return false;
  if (fConf.value){
    const wanted = fConf.value.split(",");
    if (!wanted.includes(q.confidence)) return false;
  }
  if (fStatus.value){
    const reviewed = isReviewed(q);
    if (fStatus.value === "unreviewed" && reviewed) return false;
    if (fStatus.value === "reviewed" && !reviewed) return false;
    if (fStatus.value === "changed" && !isChanged(q)) return false;
    if (fStatus.value === "agreed" && !isAgreed(q)) return false;
    if (fStatus.value === "edited" && !isEdited(q)) return false;
    if (fStatus.value === "image" && !hasImage(q)) return false;
  }
  return true;
}

function buildCard(q, displayIndex){
  const ua = userAnsOf(q);
  const reviewed = isReviewed(q);
  const changed = isChanged(q);
  const edited = isEdited(q);
  const r = getR(q.__id);
  const editing = !!r.__editing;
  const curQ = effectiveQ(q);
  const curOpts = effectiveOpts(q);
  const editor = lastEditorOf(q);

  const card = document.createElement("section");
  card.className = "qcard" + (reviewed?" reviewed":"") + (changed?" changed":"") + (edited?" edited":"");
  card.dataset.id = q.__id;

  const editorPill = editor
    ? `<span class="pill ${editor.by === REVIEWER ? "you" : "byline"}" title="Last edited by ${escapeHTML(editor.by)} at ${fmtTimeAgo(editor.at)}">by ${escapeHTML(editor.by)} &middot; ${fmtTimeAgo(editor.at)}</span>`
    : "";

  const head = document.createElement("div");
  head.className = "qhead";
  head.innerHTML = `
    <div class="qmeta">
      <span class="num">#${displayIndex}</span>
      <span class="pill">${escapeHTML(effectiveTopic(q)||"")}</span>
      ${effectiveSubtopic(q) ? `<span class="pill">${escapeHTML(effectiveSubtopic(q))}</span>` : ""}
      <span class="pill ${q.confidence}">conf: ${escapeHTML(q.confidence||"?")}</span>
      <span class="pill">${escapeHTML(q.difficulty||"")}</span>
    </div>
    <div class="qmeta">
      ${(() => { const __tags = effectiveTags(q); return __tags.length; })() ? effectiveTags(q).map(t => {
        const cls = /^\d{4}$/.test(t) ? 'tag-year'
          : t === 'intraining' ? 'tag-intraining'
          : t === 'mcq' ? 'tag-mcq'
          : (typeof t === 'string' && t.endsWith('-series')) ? 'tag-series'
          : 'tag-other';
        return `<span class="pill ${cls}" title="tag: ${escapeHTML(t)}">${escapeHTML(t)}</span>`;
      }).join('') : `<span class="pill tag-other" title="no tags">no tags</span>`}
      ${q.source ? `<span class="pill tag-other" style="opacity:.55" title="source field">${escapeHTML(q.source)}</span>` : ""}
    </div>
    <div class="qmeta">
      ${reviewed ? `<span class="pill reviewed">reviewed</span>` : `<span class="pill unreviewed">unreviewed</span>`}
      ${changed ? `<span class="pill changed">answer changed</span>` : ""}
      ${edited ? `<span class="pill edited">edited</span>` : ""}
      ${q.__isHostAdded ? `<span class="pill host" title="Added from Web app mini reviewer">host quiz</span>` : ""}
      ${hasImage(q) ? `<span class="pill has-img">image</span>` : ""}
      ${editorPill}
    </div>`;
  card.appendChild(head);

  if (hasImage(q)) {
    const wrap = document.createElement("div");
    wrap.className = "qimg-wrap";
    wrap.innerHTML = `
      <img alt="quiz image">
      <div class="imgtools">
        <button data-action="replaceimg">Replace</button>
        <button data-action="removeimg">Remove</button>
      </div>
      <div class="imgmeta">${r.imageW||"?"}x${r.imageH||"?"} &middot; from cloud</div>`;
    const imgEl = wrap.querySelector("img");
    imgEl.src = r.imageUrl;
    imgEl.addEventListener("click", () => openLightbox(r.imageUrl));
    wrap.querySelector('[data-action="removeimg"]').addEventListener("click", () => {
      if (confirm("Remove the attached image (deletes from cloud)?")) removeImage(q.__id);
    });
    wrap.querySelector('[data-action="replaceimg"]').addEventListener("click", () => {
      getFileInput().click();
    });
    card.appendChild(wrap);
  }

  // File input is created lazily on first Attach/Replace click — saves 1200
  // hidden <input type=file> elements that mobile browsers still cost a bit of
  // memory and accessibility-tree work for.
  let fileInput = null;
  function getFileInput(){
    if (fileInput) return fileInput;
    fileInput = document.createElement("input");
    fileInput.type = "file"; fileInput.accept = "image/*"; fileInput.className = "file-input";
    fileInput.addEventListener("change", e => {
      const f = e.target.files && e.target.files[0];
      if (f) attachImage(q.__id, f);
      e.target.value = "";
    });
    card.appendChild(fileInput);
    return fileInput;
  }

  if (editing) {
    const box = document.createElement("div");
    box.className = "editbox";
    box.innerHTML = `
      <label>Question stem</label>
      <textarea data-edit="q"></textarea>
      <label>Options (the correct answer follows the index)</label>
      <div data-edit="opts"></div>
      <button data-action="addopt" style="font-size:12px;padding:6px 10px">+ Add option</button>
      <label style="margin-top:14px">Topic</label>
      <input type="text" data-edit="topic" list="mr-topics-dl" placeholder="e.g. Trauma, Cardiology">
      <datalist id="mr-topics-dl"></datalist>
      <label style="margin-top:8px">Subtopic</label>
      <input type="text" data-edit="subtopic" placeholder="e.g. Aortic injury, ACS">
      <label style="margin-top:8px">Tags <span style="color:var(--muted);font-weight:normal">(comma-separated, e.g. mcq, trauma-series, 2562)</span></label>
      <input type="text" data-edit="tags" placeholder="comma-separated">
      <label style="margin-top:14px">Explanation &amp; reference</label>
      <textarea data-edit="exp" rows="4" placeholder="High-yield reasoning + textbook citation"></textarea>
      <div class="ctrls">
        <button data-action="save" class="primary">Save changes</button>
        <button data-action="reset">Reset to original</button>
        <button data-action="cancel">Cancel</button>
      </div>`;
    const taQ = box.querySelector('[data-edit="q"]'); taQ.value = curQ;
    const taExp = box.querySelector('[data-edit="exp"]'); if (taExp) {
      taExp.value = effectiveExp(q);
    }
    const taTopic = box.querySelector('[data-edit="topic"]'); if (taTopic) taTopic.value = effectiveTopic(q);
    const taSubtopic = box.querySelector('[data-edit="subtopic"]'); if (taSubtopic) taSubtopic.value = effectiveSubtopic(q);
    const taTags = box.querySelector('[data-edit="tags"]'); if (taTags) taTags.value = effectiveTags(q).join(", ");
    const dl = box.querySelector('#mr-topics-dl');
    if (dl){
      const allTopics = Array.from(new Set(POOL.map(qq => effectiveTopic(qq)).filter(Boolean))).sort();
      dl.innerHTML = allTopics.map(t => `<option value="${escapeHTML(t)}">`).join("");
    }
    const optsHost = box.querySelector('[data-edit="opts"]');
    function renderOptInputs(arr){
      optsHost.innerHTML = "";
      arr.forEach((o, i) => {
        const row = document.createElement("div");
        row.className = "opt-edit";
        const lbl = document.createElement("span"); lbl.className = "lbl"; lbl.textContent = letter(i);
        const inp = document.createElement("input"); inp.type = "text"; inp.value = o;
        const btn = document.createElement("button"); btn.textContent = "X";
        btn.addEventListener("click", () => {
          const cur = Array.from(optsHost.querySelectorAll('input')).map(x => x.value);
          cur.splice(i, 1);
          renderOptInputs(cur);
        });
        row.appendChild(lbl); row.appendChild(inp); row.appendChild(btn);
        optsHost.appendChild(row);
      });
    }
    renderOptInputs(curOpts.slice());

    box.querySelector('[data-action="addopt"]').addEventListener("click", () => {
      const cur = Array.from(optsHost.querySelectorAll('input')).map(x => x.value);
      cur.push(""); renderOptInputs(cur);
    });
    box.querySelector('[data-action="save"]').addEventListener("click", () => {
      const newQ = taQ.value.trim();
      const newOpts = Array.from(optsHost.querySelectorAll('input')).map(x => x.value).filter(s => s.length > 0);
      if (newOpts.length < 2){ toast("Need at least 2 options", true); return; }
      const newExp = (taExp && taExp.value || "").trim();
      const newTopic = (taTopic && taTopic.value || "").trim();
      const newSubtopic = (taSubtopic && taSubtopic.value || "").trim();
      const newTagsRaw = (taTags && taTags.value || "").trim();
      const newTags = newTagsRaw ? newTagsRaw.split(",").map(s => s.trim()).filter(Boolean) : [];
      const patch = { __editing: false };
      if (newQ && newQ !== q.q) patch.userQ = newQ; else patch.userQ = null;
      if (JSON.stringify(newOpts) !== JSON.stringify(q.opts)) patch.userOpts = newOpts; else patch.userOpts = null;
      if (newExp && newExp !== (q.exp||"")) patch.userExp = newExp; else patch.userExp = null;
      if (newTopic && newTopic !== (q.topic||"")) patch.userTopic = newTopic; else patch.userTopic = null;
      if (newSubtopic !== (q.subtopic||"")) patch.userSubtopic = newSubtopic; else patch.userSubtopic = null;
      const __origTags = Array.isArray(q.tags) ? q.tags : [];
      if (JSON.stringify(newTags) !== JSON.stringify(__origTags)) patch.userTags = newTags; else patch.userTags = null;
      const cur = STATE[q.__id] || {};
      if (typeof cur.userAns === "number" && cur.userAns >= newOpts.length) patch.userAns = newOpts.length - 1;
      pushQuestionUpdate(q.__id, patch);
      toast("Question saved");
    });
    box.querySelector('[data-action="reset"]').addEventListener("click", () => {
      if (!confirm("Reset to the original question and options (clears cloud edit)?")) return;
      pushQuestionUpdate(q.__id, { userQ: null, userOpts: null, userExp: null, userTopic: null, userSubtopic: null, userTags: null, __editing: false });
    });
    box.querySelector('[data-action="cancel"]').addEventListener("click", () => {
      const cur = STATE[q.__id] || {}; cur.__editing = false; STATE[q.__id] = cur;
      rerender();
    });
    card.appendChild(box);
  } else {
    const stem = document.createElement("div");
    stem.className = "qstem";
    stem.textContent = curQ;
    card.appendChild(stem);

    const opts = document.createElement("div");
    opts.className = "opts";
    curOpts.forEach((opt, i) => {
      const isAI = !edited && (i === q.ans);
      const isUser = (ua === i);
      const klass = "opt" + (isAI && isUser ? " both" : isAI ? " ai" : isUser ? " user" : "");
      const lab = document.createElement("label");
      lab.className = klass;
      lab.innerHTML = `
        <input type="radio" name="ans-${q.__id}" value="${i}" ${isUser?"checked":""}>
        <span class="otext"><b>${letter(i)}.</b> ${escapeHTML(opt)}</span>
        <span class="badges">
          ${isAI ? `<span class="badge ai">AI ans</span>` : ""}
          ${isUser ? `<span class="badge user">picked</span>` : ""}
        </span>`;
      lab.querySelector("input").addEventListener("change", e => {
        const v = parseInt(e.target.value, 10);
        pushQuestionUpdate(q.__id, { userAns: v, reviewed: true });
      });
      opts.appendChild(lab);
    });
    card.appendChild(opts);
  }

  const details = document.createElement("details");
  const expIsEdited = (typeof getR(q.__id).userExp === "string");
  details.innerHTML = `<summary>AI explanation &amp; reference${expIsEdited ? " <span class='pill edited' style='margin-left:6px'>edited</span>" : ""}</summary><div class="exp">${escapeHTML(effectiveExp(q) || "(none)")}</div>`;
  card.appendChild(details);

  const noteWrap = document.createElement("details");
  // Show a small preview of the saved note in the summary so users can see
  // there's content without expanding. The full textarea is created lazily
  // on first open — saves 1200 textareas × IME overhead on mobile.
  const __noteSaved = getR(q.__id).note || "";
  const __notePreview = __noteSaved ? ` — ${escapeHTML(__noteSaved.slice(0, 40))}${__noteSaved.length > 40 ? "…" : ""}` : "";
  noteWrap.innerHTML = `<summary>Group note (synced)${__notePreview}</summary>`;
  let __noteHydrated = false;
  noteWrap.addEventListener("toggle", () => {
    if (!noteWrap.open || __noteHydrated) return;
    __noteHydrated = true;
    const ta = document.createElement("textarea");
    ta.className = "note";
    ta.placeholder = "A shared note for this question - all reviewers see this";
    ta.value = (getR(q.__id).note || "");
    let noteTimer;
    ta.addEventListener("input", () => {
      clearTimeout(noteTimer);
      noteTimer = setTimeout(() => pushQuestionUpdate(q.__id, { note: ta.value }), 600);
    });
    noteWrap.appendChild(ta);
    // Auto-focus on toggle-open so user can start typing right away
    setTimeout(() => ta.focus(), 0);
  });
  card.appendChild(noteWrap);

  const actions = document.createElement("div");
  actions.className = "actions";
  actions.innerHTML = `
    <div class="left">
      <button data-action="agree" ${editing?"disabled":""}>Agree with AI</button>
      <button data-action="edit">${editing ? "Editing..." : (edited ? "Edit (edited)" : "Edit question")}</button>
      <button data-action="attachimg">${hasImage(q) ? "Replace image" : "Attach image"}</button>
      <button data-action="reviewed">Mark reviewed</button>
      <button data-action="unreview">Unreview</button>
      <button data-action="delete" class="del" title="Delete this question from the pool (cannot be undone)">Delete</button>
    </div>
    <div class="qmeta"><span class="pill">${q.__id}</span></div>`;
  actions.querySelector('[data-action="agree"]').addEventListener("click", () => {
    pushQuestionUpdate(q.__id, { userAns: q.ans, reviewed: true });
  });
  actions.querySelector('[data-action="edit"]').addEventListener("click", () => {
    const cur = STATE[q.__id] || {}; cur.__editing = !editing; STATE[q.__id] = cur;
    rerender();
    // After re-render, scroll the card into view so the editbox isn't hidden under the footer
    if (!editing){
      requestAnimationFrame(() => {
        const c = document.querySelector(`.qcard[data-id="${q.__id}"]`);
        if (!c) return;
        const box = c.querySelector(".editbox");
        const target = box || c;
        target.scrollIntoView({behavior:"smooth", block:"end"});
      });
    }
  });
  actions.querySelector('[data-action="attachimg"]').addEventListener("click", () => getFileInput().click());
  actions.querySelector('[data-action="reviewed"]').addEventListener("click", () => {
    pushQuestionUpdate(q.__id, { reviewed: true });
  });
  actions.querySelector('[data-action="unreview"]').addEventListener("click", () => {
    pushQuestionUpdate(q.__id, { reviewed: false });
  });
  actions.querySelector('[data-action="delete"]').addEventListener("click", async () => {
    if (!confirm("Delete " + q.__id + "?\n\nThis hides it from every reviewer and removes it from the Web app pool. The change syncs in real time and cannot be undone from the UI.")) return;
    try {
      await deleteQuestion(q.__id);
      toast("Deleted " + q.__id);
    } catch(e){
      toast("Delete failed: " + e.message, true);
    }
  });
  card.appendChild(actions);

  return card;
}

// --- UI state preservation across rerender --------------------------------
// rerender() rebuilds every .qcard from scratch, which collapses any open
// <details> panel and drops keyboard focus. The user reported that the
// "Group note (synced)" panel folds back closed mid-typing. We capture
// open state + focus + cursor before the wipe and restore them after.
function captureUiState(){
  const open = new Map();
  document.querySelectorAll(".qcard details").forEach(d => {
    const card = d.closest(".qcard");
    if (!card) return;
    const sum = d.querySelector("summary");
    const label = sum ? sum.textContent.trim() : "";
    open.set(card.dataset.id + "::" + label, !!d.open);
  });
  let focus = null;
  const a = document.activeElement;
  if (a && (a.tagName === "TEXTAREA" || a.tagName === "INPUT")){
    const card = a.closest(".qcard");
    if (card){
      let kind = null;
      if (a.classList.contains("note"))                 kind = "note";
      else if (a.matches('[data-edit="q"]'))            kind = "edit-q";
      else if (a.matches('[data-edit="exp"]'))          kind = "edit-exp";
      if (kind){
        let sel = [0, 0];
        try { sel = [a.selectionStart, a.selectionEnd]; } catch(e){}
        focus = { qid: card.dataset.id, kind, sel };
      }
    }
  }
  return { open, focus };
}
function restoreUiState(s){
  if (!s) return;
  // Re-open <details> that were open before
  if (s.open){
    document.querySelectorAll(".qcard details").forEach(d => {
      const card = d.closest(".qcard");
      if (!card) return;
      const sum = d.querySelector("summary");
      const label = sum ? sum.textContent.trim() : "";
      const key = card.dataset.id + "::" + label;
      if (s.open.has(key)) d.open = s.open.get(key);
    });
  }
  // Restore focus + cursor
  if (s.focus){
    const card = document.querySelector(`.qcard[data-id="${s.focus.qid}"]`);
    if (card){
      let el = null;
      if      (s.focus.kind === "note")     el = card.querySelector("textarea.note");
      else if (s.focus.kind === "edit-q")   el = card.querySelector('[data-edit="q"]');
      else if (s.focus.kind === "edit-exp") el = card.querySelector('[data-edit="exp"]');
      if (el){
        el.focus();
        try { el.setSelectionRange(s.focus.sel[0], s.focus.sel[1]); } catch(e){}
      }
    }
  }
}
// Cheap incremental DOM update: when only specific cards changed (typical
// snapshot case), replace just those .qcard elements instead of rebuilding
// all 1200+ cards. Returns true if it succeeded; false → caller should fall
// back to scheduleRerender(). Skips cards that contain the focused input,
// so the user's typing is never disrupted.
function applyIncrementalUpdates(qids){
  if (!Array.isArray(qids) || qids.length === 0) return true;
  if (POOL.length === 0) return false;  // splash → full
  if (!root.querySelector(".qcard")) return false;  // empty list → full

  // Pre-check: every changed qid is in a state where incremental works
  for (const qid of qids){
    const oldCard = root.querySelector(`.qcard[data-id="${CSS.escape(qid)}"]`);
    const q = POOL_MAP[qid];
    if (q && passesFilters(q) && !oldCard) return false;       // need to add → full
    if (oldCard && (!q || !passesFilters(q))){
      // Card should disappear: cheap to remove inline; topic counts get a bit stale.
      // But if the active card is the one being removed, fall back to full so we don't
      // detach the focused element silently.
      if (oldCard.contains(document.activeElement)) return false;
    }
  }

  let updated = 0;
  for (const qid of qids){
    const oldCard = root.querySelector(`.qcard[data-id="${CSS.escape(qid)}"]`);
    if (!oldCard) continue;
    if (oldCard.contains(document.activeElement)) continue;    // never disturb the typing card
    const q = POOL_MAP[qid];
    if (!q || !passesFilters(q)){
      oldCard.remove();
      updated++;
      continue;
    }
    // Read existing display index (#NN) so the new card keeps its number
    const numEl = oldCard.querySelector(".qmeta .num");
    let n = 1;
    if (numEl){ const m = numEl.textContent.match(/(\d+)/); if (m) n = parseInt(m[1]); }
    // Preserve which <details> panels were open so other reviewers' note edits
    // surface immediately into already-open panels (lazy textarea hydrates from
    // current STATE on toggle-open).
    const __openLabels = new Set();
    oldCard.querySelectorAll("details").forEach(d => {
      if (!d.open) return;
      const sum = d.querySelector("summary");
      const label = sum ? sum.textContent.trim().split(" — ")[0].split(" —")[0].trim() : "";
      __openLabels.add(label);
    });
    const newCard = buildCard(q, n);
    if (__openLabels.size > 0){
      newCard.querySelectorAll("details").forEach(d => {
        const sum = d.querySelector("summary");
        const label = sum ? sum.textContent.trim().split(" — ")[0].split(" —")[0].trim() : "";
        if (__openLabels.has(label)) d.open = true;
      });
    }
    oldCard.parentNode.replaceChild(newCard, oldCard);
    updated++;
  }
  if (updated > 0) updateStats();
  return true;
}
let __rafScheduled = false;
function scheduleRerender(){
  if (__rafScheduled) return;
  __rafScheduled = true;
  requestAnimationFrame(() => {
    __rafScheduled = false;
    rerender();
  });
}
let allCollapsed = false;
function rerender(){
  const __ui = captureUiState();
  // CRITICAL: preserve the user's active card across the DOM wipe so typing,
  // IME composition, focus, cursor and any in-flight textarea state stay intact.
  // The card gets re-inserted into its correct position after the rebuild.
  let __activeCard = null;
  let __activeCardTopBefore = 0;
  const __a = document.activeElement;
  if (__a && (__a.tagName === "TEXTAREA" || __a.tagName === "INPUT")){
    const c = __a.closest(".qcard");
    if (c && root.contains(c)){
      __activeCard = c;
      // Capture viewport position BEFORE detach so we can restore scroll later.
      __activeCardTopBefore = c.getBoundingClientRect().top;
      c.remove();
    }
  }
  root.innerHTML = "";

  if (POOL.length === 0){
    root.appendChild(renderSplash());
    updateStats();
  if (__activeCard){
    const placeholder = root.querySelector(`.qcard[data-id="${__activeCard.dataset.id}"]`);
    if (placeholder && placeholder.parentNode) placeholder.parentNode.replaceChild(__activeCard, placeholder);
    // Pin the active card at the same viewport position it was before — prevents
    // the page from jumping when surrounding cards change height during rebuild.
    if (__activeCard.isConnected){
      const after = __activeCard.getBoundingClientRect().top;
      const delta = after - __activeCardTopBefore;
      if (Math.abs(delta) > 0.5) window.scrollBy(0, delta);
    }
  }
  restoreUiState(__ui);
    return;
  }

  const filtered = POOL.filter(passesFilters);
  const sortMode = (document.getElementById("fSort") || {}).value || "";

  if (filtered.length === 0){
    const e = document.createElement("div"); e.className = "empty"; e.textContent = "No questions match these filters.";
    root.appendChild(e);
    updateStats();
  if (__activeCard){
    const placeholder = root.querySelector(`.qcard[data-id="${__activeCard.dataset.id}"]`);
    if (placeholder && placeholder.parentNode) placeholder.parentNode.replaceChild(__activeCard, placeholder);
    // Pin the active card at the same viewport position it was before — prevents
    // the page from jumping when surrounding cards change height during rebuild.
    if (__activeCard.isConnected){
      const after = __activeCard.getBoundingClientRect().top;
      const delta = after - __activeCardTopBefore;
      if (Math.abs(delta) > 0.5) window.scrollBy(0, delta);
    }
  }
  restoreUiState(__ui);
    return;
  }

  // Flat sort by question __id
  if (sortMode === "id-asc" || sortMode === "id-desc"){
    const arr = filtered.slice().sort((a, b) => {
      const A = a.__id || ""; const B = b.__id || "";
      return sortMode === "id-asc" ? A.localeCompare(B) : B.localeCompare(A);
    });
    let n = 0;
    arr.forEach(q => { n++; root.appendChild(buildCard(q, n)); });
    updateStats();
  if (__activeCard){
    const placeholder = root.querySelector(`.qcard[data-id="${__activeCard.dataset.id}"]`);
    if (placeholder && placeholder.parentNode) placeholder.parentNode.replaceChild(__activeCard, placeholder);
    // Pin the active card at the same viewport position it was before — prevents
    // the page from jumping when surrounding cards change height during rebuild.
    if (__activeCard.isConnected){
      const after = __activeCard.getBoundingClientRect().top;
      const delta = after - __activeCardTopBefore;
      if (Math.abs(delta) > 0.5) window.scrollBy(0, delta);
    }
  }
  restoreUiState(__ui);
    return;
  }

  // Default: group by topic
  const byTopic = {};
  filtered.forEach(q => { const t = effectiveTopic(q)||"(none)"; (byTopic[t] = byTopic[t]||[]).push(q); });

  {
    let n = 0;
    Object.keys(byTopic).sort().forEach(topic => {
      const group = document.createElement("div"); group.className = "topic-group";
      const head = document.createElement("div"); head.className = "topic-head";
      const arr = byTopic[topic];
      const reviewedN = arr.filter(isReviewed).length;
      const changedN = arr.filter(isChanged).length;
      const editedN = arr.filter(isEdited).length;
      const imgN = arr.filter(hasImage).length;
      head.innerHTML = `
        <h2>${escapeHTML(topic)}</h2>
        <div class="topic-meta">
          ${arr.length} questions &middot; ${reviewedN} reviewed &middot; ${changedN} changed${editedN?` &middot; ${editedN} edited`:""}${imgN?` &middot; ${imgN} with image`:""}
          <span class="pill" style="margin-left:6px">click to toggle</span>
        </div>`;
      const body = document.createElement("div"); body.className = "topic-body";
      if (allCollapsed) body.style.display = "none";
      head.addEventListener("click", () => { body.style.display = (body.style.display === "none") ? "" : "none"; });
      group.appendChild(head);
      arr.forEach(q => { n++; body.appendChild(buildCard(q, n)); });
      group.appendChild(body);
      root.appendChild(group);
    });
  }
  updateStats();
  if (__activeCard){
    const placeholder = root.querySelector(`.qcard[data-id="${__activeCard.dataset.id}"]`);
    if (placeholder && placeholder.parentNode) placeholder.parentNode.replaceChild(__activeCard, placeholder);
    // Pin the active card at the same viewport position it was before — prevents
    // the page from jumping when surrounding cards change height during rebuild.
    if (__activeCard.isConnected){
      const after = __activeCard.getBoundingClientRect().top;
      const delta = after - __activeCardTopBefore;
      if (Math.abs(delta) > 0.5) window.scrollBy(0, delta);
    }
  }
  restoreUiState(__ui);
}

function updateStats(){
  const total = POOL.length;
  const reviewedN = POOL.filter(isReviewed).length;
  const changedN = POOL.filter(isChanged).length;
  const editedN = POOL.filter(isEdited).length;
  const imageN = POOL.filter(hasImage).length;
  document.getElementById("reviewedCount").textContent = reviewedN;
  document.getElementById("totalCount").textContent = total;
  document.getElementById("changedCount").textContent = changedN;
  document.getElementById("editedCount").textContent = editedN;
  document.getElementById("imageCount").textContent = imageN;
  document.getElementById("progressBar").style.width = total ? ((reviewedN/total)*100).toFixed(1) + "%" : "0%";
  if (total === 0){
    document.getElementById("stats").innerHTML = '<span style="color:var(--muted)">No pool loaded yet - drop a JSON file or click <b>UPLOAD POOL</b> above.</span>';
    return;
  }
  const conf = { high:0, medium:0, low:0 };
  POOL.forEach(q => { if (conf[q.confidence] !== undefined) conf[q.confidence]++; });
  const filteredCount = POOL.filter(passesFilters).length;
  document.getElementById("stats").innerHTML = `
    <span>Showing <b>${filteredCount}</b> of ${total}</span>
    <span>Confidence: <span class="pill high">high ${conf.high}</span>
          <span class="pill medium">medium ${conf.medium}</span>
          <span class="pill low">low ${conf.low}</span></span>
    <span>Group: <b>${reviewedN}</b> reviewed &middot; <b>${changedN}</b> changed &middot; <b>${editedN}</b> edited &middot; <b>${imageN}</b> images</span>`;
}

// Drag-and-drop
let dragDepth = 0;
window.addEventListener("dragenter", e => {
  if (!e.dataTransfer || !Array.from(e.dataTransfer.types).includes("Files")) return;

// ---------- Export ----------
function buildExport(){
  return POOL.map(q => {
    const r = getR(q.__id);
    const useQ = (typeof r.userQ === "string" && r.userQ.length > 0) ? r.userQ : q.q;
    const useOpts = (Array.isArray(r.userOpts) && r.userOpts.length > 0) ? r.userOpts : q.opts;
    let userAns = (typeof r.userAns === "number") ? r.userAns : q.ans;
    if (typeof userAns !== "number" || userAns < 0 || userAns >= useOpts.length) userAns = 0;
    const useExp = (typeof r.userExp === "string" && r.userExp.length > 0) ? r.userExp : (q.exp || "");
    const merged = {
      q: useQ, opts: useOpts, ans: userAns, exp: useExp,
      topic: effectiveTopic(q), subtopic: effectiveSubtopic(q), difficulty: q.difficulty,
      confidence: q.confidence, source: q.source, year: q.year, page: q.page,
      hasAnswer: true,
      __sourceId: q.__sourceId, __sourceUpdatedAt: q.__sourceUpdatedAt
    };
    const obj = denormalizeQuestion(merged, POOL_SCHEMA);
    if (r.imageUrl){
      obj.image = r.imageUrl; obj.imageW = r.imageW; obj.imageH = r.imageH;
    }
    if (r.note) obj._userNote = r.note;
    if (typeof r.userAns === "number" && r.userAns !== q.ans) obj._userChanged = true;
    // Carry tags via the same effective helper
      const __tags = effectiveTags(q); if (__tags && __tags.length) obj.tags = __tags.slice();
      if (typeof r.userQ === "string" || Array.isArray(r.userOpts)) obj._userEdited = true;
      if (typeof r.userTopic === "string" || typeof r.userSubtopic === "string" || Array.isArray(r.userTags)) obj._userEdited = true;
    if (r.reviewed) obj._userReviewed = true;
    if (r.editedBy) obj._editedBy = r.editedBy;
    return obj;
  });
}
function downloadExport(){
  const out = buildExport();
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:"application/json"});
  const ts = new Date().toISOString().replace(/[:.]/g,"-").slice(0,19);
  const filename = `CompleteQuizPools_Ver.${POOL_VERSION}_groupreviewed_${ts}.json`;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
  return filename;
}
function doExport(){
  if (POOL.length === 0){ toast("No pool loaded - nothing to export.", true); return; }
  const fn = downloadExport();
  toast(`Downloaded ${fn} (cloud snapshot, schema ${POOL_SCHEMA})`);
}
function sendToOwner(){
  if (POOL.length === 0){ toast("No pool loaded - nothing to send.", true); return; }
  const filename = downloadExport();
  const reviewedN = POOL.filter(isReviewed).length;
  const changedN  = POOL.filter(isChanged).length;
  const editedN   = POOL.filter(isEdited).length;
  const imageN    = POOL.filter(hasImage).length;
  const subject = `EM Quiz Pool - Group review v${POOL_VERSION} (${reviewedN}/${POOL.length})`;
  const body = [
    `Hi ${OWNER_NAME},`, ``,
    `Group review snapshot of EM Quiz Pool v${POOL_VERSION} (schema ${POOL_SCHEMA}).`, ``,
    `Stats:`,
    `  - Reviewed:        ${reviewedN} of ${POOL.length}`,
    `  - Answer changed:  ${changedN}`,
    `  - Text edited:     ${editedN}`,
    `  - Images attached: ${imageN}`, ``,
    `Please attach the file that was just downloaded:`,
    `  ${filename}`, ``,
    `(Look in your Downloads folder if you closed the toast.)`, ``,
    `- sent from EM Quiz Pool Reviewer (Realtime)`
  ].join("\n");
  const mailto = "mailto:" + encodeURIComponent(OWNER_EMAIL)
                + "?subject=" + encodeURIComponent(subject)
                + "&body=" + encodeURIComponent(body);
  window.location.href = mailto;
  toast(`Downloaded ${filename} - now attach it to the email that just opened.`);
}

// ---------- Keyboard ----------
document.addEventListener("keydown", (e) => {
  if (POOL.length === 0) return;
  if (/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName)) return;
  const card = document.querySelector(".qcard:hover") || document.querySelector(".qcard");
  if (!card) return;
  const id = card.dataset.id;
  const q = POOL.find(x => x.__id === id);
  if (!q) return;
  if (/^[1-9]$/.test(e.key)) {
    const i = parseInt(e.key,10) - 1;
    const opts = effectiveOpts(q);
    if (i < opts.length) {
      pushQuestionUpdate(id, { userAns: i, reviewed: true });
      e.preventDefault();
    }
  } else if (e.key === "r" || e.key === "R") {
    pushQuestionUpdate(id, { reviewed: !getR(id).reviewed });
  } else if (e.key === "n" || e.key === "N") {
    const cards = Array.from(document.querySelectorAll(".qcard"));
    const idx = cards.findIndex(c => c.dataset.id === id);
    if (idx >= 0 && idx < cards.length - 1) cards[idx+1].scrollIntoView({behavior:"smooth", block:"center"});
  }
});

// ---------- Boot ----------
(async () => {
  // Soft password gate. Default password "em-review-2026". Stored unlock flag
  // in localStorage skips this on subsequent visits from the same browser.
  if (!await checkPasswordGate()) return;

  // Ask for display name first if missing
  REVIEWER = loadReviewerName();
  if (!REVIEWER){
    REVIEWER = await askReviewerName("");
  }
  updateReviewerPill();
  setCloudStatus(cloudOK ? "loading" : "off", cloudOK ? "connecting..." : "offline (Firebase blocked)");
  if (cloudOK) subscribeToActivePool();
  if (cloudOK) subscribeToHostQuestions();

  // Load pool
  if (tryLoadCachedUploaded()){
    rerender();
    return;
  }
  const fetched = await tryAutoFetch();
  if (!fetched){ clearActivePool(); }
  rerender();

  // Re-render every 30s so "X seconds ago" timestamps stay fresh
  setInterval(() => {
    if (POOL.length > 0) rerender();
  }, 30000);
})();
